<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Agenda tu cita</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100dvh;
    font-family: -apple-system, sans-serif;
  }
  .video-wrap { position: relative; width: 100%; max-width: 430px; }
  video {
    display: block;
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: contain;
    background: #111;
  }

  .overlay-btn {
    position: absolute;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 999px;
    color: #fff; font-size: 13px; font-weight: 600;
    padding: 8px 18px; text-decoration: none;
    display: flex; align-items: center; gap: 7px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .overlay-btn.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .overlay-btn svg { width: 18px; height: 18px; }

  .btn-cita  { bottom: 22%; left: 50%; transform: translateX(-50%); }
  .btn-maps  { bottom: 35%; left: 6%; }
  .btn-phone { bottom: 35%; right: 6%; }
  .btn-vcf   { bottom: 22%; right: 6%; }

  /* Botón replay */
  .btn-replay {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.6);
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 50%;
    width: 60px; height: 60px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .btn-replay.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .btn-replay svg { width: 28px; height: 28px; color: #fff; margin-left: 4px; }

    display: grid; grid-template-columns: repeat(4, 1fr);
    background: #111; border-top: 1px solid #222;
  }
