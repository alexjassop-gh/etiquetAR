<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Agenda tu cita</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100dvh;
    font-family: -apple-system, sans-serif;
  }
  .video-wrap { position: relative; width: 100%; max-width: 430px; }
  video {
    display: block;
    width: 100%;
    height: auto;
    background: #111;
  }
  .overlay-btn {
    position: absolute;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 999px;
    color: #fff; font-size: 13px; font-weight: 600;
    padding: 8px 18px; text-decoration: none;
    display: flex; align-items: center; gap: 7px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .overlay-btn.visible { opacity: 1; pointer-events: auto; }
  .overlay-btn svg { width: 18px; height: 18px; }

  .btn-cita  { top: 55%; right: 4%; }
  .btn-maps  { top: 30%; left: 2%; }
