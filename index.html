<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Agenda tu cita</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100dvh;
    font-family: -apple-system, sans-serif;
  }
  .video-wrap { position: relative; width: 100%; max-width: 430px; }
  video { display: block; width: 100%; aspect-ratio: 9/16; object-fit: cover; background: #111; }

  .overlay-btn {
    position: absolute;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 999px;
    color: #fff; font-size: 13px; font-weight: 600;
    padding: 8px 18px; text-decoration: none;
    display: flex; align-items: center; gap: 7px;
    white-space: nowrap;
  }
  .overlay-btn svg { width: 18px; height: 18px; }

  .btn-cita  { bottom: 22%; left: 50%; transform: translateX(-50%); }
  .btn-maps  { bottom: 35%; left: 6%; }
  .btn-phone { bottom: 35%; right: 6%; }
  .btn-vcf   { bottom: 22%; right: 6%; }

  .action-bar {
    width: 100%; max-width: 430px;
    display: grid; grid-template-columns: repeat(4, 1fr);
    background: #111; border-top: 1px solid #222;
  }
  .action-btn {
    display: flex; flex-direction: column; align-items: center;
    gap: 5px; padding: 14px 4px; text-decoration: none;
    color: #aaa; font-size: 11px; font-weight: 500;
    border-right: 1px solid #222;
  }
  .action-btn:last-child { border-right: none; }
  .action-btn svg { width: 26px; height: 26px; }
  .action-btn.cita  svg { color: #e8453c; }
  .action-btn.maps  svg { color: #4285f4; }
  .action-btn.phone svg { color: #34a853; }
  .action-btn.vcf   svg { color: #ff9500; }
</style>
</head>
<body>
<div class="video-wrap">
  <video src="video botella tag.mp4" autoplay muted playsinline loop preload="auto"></video>

  <!-- Botón cita -->
  <a href="https://calendar.google.com" class="overlay-btn btn-cita" target="_blank">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Agendar cita
  </a>

  <!-- Botón Maps — coordenadas Torre Eiffel como ejemplo -->
  <a href="https://maps.google.com/?q=25.5426,-103.4068" class="overlay-btn btn-maps" target="_blank">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
    Cómo llegar
  </a>

  <!-- Botón llamada -->
  <a href="tel:+521234567890" class="overlay-btn btn-phone">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.63A2 2 0 012 .18h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92z"/></svg>
    Llamar
  </a>

  <!-- Botón guardar contacto -->
  <a href="contacto.vcf" class="overlay-btn btn-vcf" download>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Guardar contacto
  </a>
</div>

<!-- Barra inferior -->
<div class="action-bar">
  <a href="https://calendar.google.com" class="action-btn cita" target="_blank">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Cita
  </a>
  <a href="https://maps.google.com/?q=25.5426,-103.4068" class="action-btn maps" target="_blank">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
    Maps
  </a>
  <a href="tel:+521234567890" class="action-btn phone">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.63A2 2 0 012 .18h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92z"/></svg>
    Llamar
  </a>
  <a href="contacto.vcf" class="action-btn vcf" download>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Contacto
  </a>
</div>
</body>
</html>
